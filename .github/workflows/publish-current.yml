name: Publish Current

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create draft release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

jobs:
  windows-installer:
    name: Windows NSIS
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix shared ci
          npm --prefix server ci
          npm --prefix client ci

      - name: Export signing credentials (Windows)
        shell: bash
        env:
          _CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          _CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          [ -n "$_CSC_LINK" ]         && echo "CSC_LINK=$_CSC_LINK" >> "$GITHUB_ENV" || true
          [ -n "$_CSC_KEY_PASSWORD" ] && echo "CSC_KEY_PASSWORD=$_CSC_KEY_PASSWORD" >> "$GITHUB_ENV" || true

      - name: Signing preflight (Windows)
        run: npm run release:preflight:win

      - name: Build Windows installer
        run: npm run build:desktop:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openchat-windows-installer
          path: |
            dist-desktop\*.exe
            dist-desktop\*.yml
            dist-desktop\*.blockmap
          if-no-files-found: error

  mac-installer:
    name: macOS DMG/ZIP
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix shared ci
          npm --prefix server ci
          npm --prefix client ci

      - name: Export signing credentials (macOS)
        shell: bash
        env:
          _CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          _CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          _APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [ -n "$_CSC_LINK" ]                    && echo "CSC_LINK=$_CSC_LINK" >> "$GITHUB_ENV" || true
          [ -n "$_CSC_KEY_PASSWORD" ]            && echo "CSC_KEY_PASSWORD=$_CSC_KEY_PASSWORD" >> "$GITHUB_ENV" || true
          [ -n "$_APPLE_ID" ]                    && echo "APPLE_ID=$_APPLE_ID" >> "$GITHUB_ENV" || true
          [ -n "$_APPLE_APP_SPECIFIC_PASSWORD" ] && echo "APPLE_APP_SPECIFIC_PASSWORD=$_APPLE_APP_SPECIFIC_PASSWORD" >> "$GITHUB_ENV" || true
          [ -n "$_APPLE_TEAM_ID" ]               && echo "APPLE_TEAM_ID=$_APPLE_TEAM_ID" >> "$GITHUB_ENV" || true

      - name: Signing preflight (macOS)
        run: npm run release:preflight:mac

      - name: Build macOS installer
        shell: bash
        run: |
          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ]; then
            echo "macOS build mode: signed"
          else
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            echo "macOS build mode: unsigned"
          fi
          npm run build:desktop:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openchat-macos-installer
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.zip
            dist-desktop/*.yml
            dist-desktop/*.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: [windows-installer, mac-installer]
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: openchat-windows-installer
          path: release-assets/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: openchat-macos-installer
          path: release-assets/macos

      - name: Detect release version from artifacts
        id: version
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t versions < <(
            find release-assets -type f -name 'OpenChat-*' \
              | sed -nE 's#.*OpenChat-([0-9]+\.[0-9]+\.[0-9]+)-.*#\1#p' \
              | sort -u
          )

          if [ "${#versions[@]}" -eq 0 ]; then
            echo "No installer versions found in artifact names." >&2
            exit 1
          fi
          if [ "${#versions[@]}" -ne 1 ]; then
            printf 'Found multiple versions in artifacts: %s\n' "${versions[*]}" >&2
            exit 1
          fi

          version="${versions[0]}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Detected release version: $version"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          DRAFT: ${{ github.event.inputs.draft }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(release-assets/windows/* release-assets/macos/*)

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists; uploading/replacing assets."
            gh release upload "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "Creating release $TAG."
            args=("$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "OpenChat v$VERSION" --generate-notes)
            if [ "$DRAFT" = "true" ]; then
              args+=(--draft)
            fi
            if [ "$PRERELEASE" = "true" ]; then
              args+=(--prerelease)
            fi
            gh release create "${args[@]}"
          fi
