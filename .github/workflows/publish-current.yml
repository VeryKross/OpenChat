name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (must match package.json, e.g. 0.1.3)"
        required: true
        type: string
      draft:
        description: "Create draft release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean
      update_existing:
        description: "Update existing release assets for this version"
        required: false
        default: false
        type: boolean

jobs:
  windows-installer:
    name: Windows NSIS (${{ matrix.arch }})
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix shared ci
          npm --prefix server ci
          npm --prefix client ci --legacy-peer-deps

      - name: Validate package version
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$pkg_version" != "$RELEASE_VERSION" ]; then
            echo "package.json version ($pkg_version) does not match requested release version ($RELEASE_VERSION)." >&2
            exit 1
          fi

      - name: Export signing credentials (Windows)
        shell: bash
        env:
          _CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          _CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          [ -n "$_CSC_LINK" ]         && echo "CSC_LINK=$_CSC_LINK" >> "$GITHUB_ENV" || true
          [ -n "$_CSC_KEY_PASSWORD" ] && echo "CSC_KEY_PASSWORD=$_CSC_KEY_PASSWORD" >> "$GITHUB_ENV" || true

      - name: Signing preflight (Windows)
        run: npm run release:preflight:win

      - name: Build Windows installer
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npm run build:desktop:win:arm64
          else
            npm run build:desktop:win
          fi

      - name: Smoke test packaged Windows runtime
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $unpackedDirName = if ($arch -eq "arm64") { "win-arm64-unpacked" } else { "win-unpacked" }
          $asarPath = Join-Path "dist-desktop" "$unpackedDirName\resources\app.asar"
          if (!(Test-Path $asarPath)) {
            throw "Missing packaged app.asar for $arch build: $asarPath"
          }

          $extractDir = Join-Path $env:RUNNER_TEMP "openchat-asar-${{ matrix.arch }}"
          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }
          npx asar extract $asarPath $extractDir

          $langchainCore = Join-Path $extractDir "node_modules\@langchain\core\package.json"
          if (!(Test-Path $langchainCore)) {
            throw "Missing startup dependency in packaged app: $langchainCore"
          }

          $serverIndex = Join-Path $extractDir "server\dist\index.js"
          if (!(Test-Path $serverIndex)) {
            throw "Missing packaged server entrypoint: $serverIndex"
          }

          $expectedInstaller = Join-Path "dist-desktop" "OpenChat-${{ github.event.inputs.version }}-win-${{ matrix.arch }}.exe"
          if (!(Test-Path $expectedInstaller)) {
            throw "Missing expected installer artifact for version/arch: $expectedInstaller"
          }

          node -e "import('node:url').then(({ pathToFileURL }) => import(pathToFileURL(process.argv[1]).href)).then(() => process.exit(0)).catch((error) => { console.error(error); process.exit(1); })" $serverIndex

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openchat-windows-installer-${{ matrix.arch }}
          path: |
            dist-desktop\*.exe
            dist-desktop\*.yml
            dist-desktop\*.blockmap
          if-no-files-found: error

  mac-installer:
    name: macOS DMG/ZIP
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix shared ci
          npm --prefix server ci
          npm --prefix client ci --legacy-peer-deps

      - name: Validate package version
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$pkg_version" != "$RELEASE_VERSION" ]; then
            echo "package.json version ($pkg_version) does not match requested release version ($RELEASE_VERSION)." >&2
            exit 1
          fi

      - name: Export signing credentials (macOS)
        shell: bash
        env:
          _CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          _CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          _APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [ -n "$_CSC_LINK" ]                    && echo "CSC_LINK=$_CSC_LINK" >> "$GITHUB_ENV" || true
          [ -n "$_CSC_KEY_PASSWORD" ]            && echo "CSC_KEY_PASSWORD=$_CSC_KEY_PASSWORD" >> "$GITHUB_ENV" || true
          [ -n "$_APPLE_ID" ]                    && echo "APPLE_ID=$_APPLE_ID" >> "$GITHUB_ENV" || true
          [ -n "$_APPLE_APP_SPECIFIC_PASSWORD" ] && echo "APPLE_APP_SPECIFIC_PASSWORD=$_APPLE_APP_SPECIFIC_PASSWORD" >> "$GITHUB_ENV" || true
          [ -n "$_APPLE_TEAM_ID" ]               && echo "APPLE_TEAM_ID=$_APPLE_TEAM_ID" >> "$GITHUB_ENV" || true

      - name: Signing preflight (macOS)
        run: npm run release:preflight:mac

      - name: Build macOS installer
        shell: bash
        run: |
          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ]; then
            echo "macOS build mode: signed"
          else
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            echo "macOS build mode: unsigned"
          fi
          npm run build:desktop:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openchat-macos-installer
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.zip
            dist-desktop/*.yml
            dist-desktop/*.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: [windows-installer, mac-installer]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: openchat-windows-installer-x64
          path: release-assets/windows/x64

      - name: Download Windows ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: openchat-windows-installer-arm64
          path: release-assets/windows/arm64

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: openchat-macos-installer
          path: release-assets/macos

      - name: Validate artifact version
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          mapfile -t versions < <(
            find release-assets -type f -name 'OpenChat-*' \
              | sed -nE 's#.*OpenChat-([0-9]+\.[0-9]+\.[0-9]+)-.*#\1#p' \
              | sort -u
          )

          if [ "${#versions[@]}" -eq 0 ]; then
            echo "No installer versions found in artifact names." >&2
            exit 1
          fi
          if [ "${#versions[@]}" -ne 1 ]; then
            printf 'Found multiple versions in artifacts: %s\n' "${versions[*]}" >&2
            exit 1
          fi

          version="${versions[0]}"
          if [ "$version" != "$RELEASE_VERSION" ]; then
            echo "Artifact version ($version) does not match requested release version ($RELEASE_VERSION)." >&2
            exit 1
          fi
          echo "Validated artifact version: $version"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ github.event.inputs.version }}
          VERSION: ${{ github.event.inputs.version }}
          DRAFT: ${{ github.event.inputs.draft }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
          UPDATE_EXISTING: ${{ github.event.inputs.update_existing }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(release-assets/windows/x64/*.exe release-assets/windows/arm64/*.exe release-assets/macos/*.dmg release-assets/macos/*.zip)

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [ "$UPDATE_EXISTING" = "true" ]; then
              echo "Release $TAG exists; uploading/replacing assets."
              gh release upload "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            else
              echo "Release $TAG already exists. Re-run with update_existing=true to replace assets." >&2
              exit 1
            fi
          else
            echo "Creating release $TAG."
            args=("$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "OpenChat v$VERSION" --generate-notes)
            if [ "$DRAFT" = "true" ]; then
              args+=(--draft)
            fi
            if [ "$PRERELEASE" = "true" ]; then
              args+=(--prerelease)
            fi
            gh release create "${args[@]}"
          fi
