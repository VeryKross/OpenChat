name: Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-installer:
    name: Windows NSIS (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix shared ci
          npm --prefix server ci
          npm --prefix client ci --legacy-peer-deps

      - name: Export signing credentials (Windows)
        shell: bash
        env:
          _CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          _CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          [ -n "$_CSC_LINK" ]         && echo "CSC_LINK=$_CSC_LINK" >> "$GITHUB_ENV" || true
          [ -n "$_CSC_KEY_PASSWORD" ] && echo "CSC_KEY_PASSWORD=$_CSC_KEY_PASSWORD" >> "$GITHUB_ENV" || true

      - name: Signing preflight (Windows)
        run: npm run release:preflight:win

      - name: Build Windows installer
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npm run build:desktop:win:arm64
          else
            npm run build:desktop:win
          fi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openchat-windows-installer-${{ matrix.arch }}
          path: |
            dist-desktop\*.exe
            dist-desktop\*.yml
            dist-desktop\*.blockmap
          if-no-files-found: error

  mac-installer:
    name: macOS DMG/ZIP
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix shared ci
          npm --prefix server ci
          npm --prefix client ci --legacy-peer-deps

      - name: Export signing credentials (macOS)
        shell: bash
        env:
          _CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          _CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          _APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [ -n "$_CSC_LINK" ]                    && echo "CSC_LINK=$_CSC_LINK" >> "$GITHUB_ENV" || true
          [ -n "$_CSC_KEY_PASSWORD" ]            && echo "CSC_KEY_PASSWORD=$_CSC_KEY_PASSWORD" >> "$GITHUB_ENV" || true
          [ -n "$_APPLE_ID" ]                    && echo "APPLE_ID=$_APPLE_ID" >> "$GITHUB_ENV" || true
          [ -n "$_APPLE_APP_SPECIFIC_PASSWORD" ] && echo "APPLE_APP_SPECIFIC_PASSWORD=$_APPLE_APP_SPECIFIC_PASSWORD" >> "$GITHUB_ENV" || true
          [ -n "$_APPLE_TEAM_ID" ]               && echo "APPLE_TEAM_ID=$_APPLE_TEAM_ID" >> "$GITHUB_ENV" || true

      - name: Signing preflight (macOS)
        run: npm run release:preflight:mac

      - name: Build macOS installer
        shell: bash
        run: |
          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ]; then
            echo "macOS build mode: signed"
          else
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            echo "macOS build mode: unsigned"
          fi
          npm run build:desktop:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openchat-macos-installer
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.zip
            dist-desktop/*.yml
            dist-desktop/*.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: [windows-installer, mac-installer]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: openchat-windows-installer-x64
          path: release-assets/windows/x64

      - name: Download Windows ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: openchat-windows-installer-arm64
          path: release-assets/windows/arm64

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: openchat-macos-installer
          path: release-assets/macos

      - name: Attach installers to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows/x64/*.exe
            release-assets/windows/arm64/*.exe
            release-assets/macos/*.dmg
            release-assets/macos/*.zip
